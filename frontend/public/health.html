<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MarkerMind - Connection Health</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e; color: #e0e0e0;
      padding: 2rem; min-height: 100vh;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #fff; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
    .checks { display: flex; flex-direction: column; gap: 1rem; max-width: 600px; }
    .check {
      background: #16213e; border-radius: 8px; padding: 1rem 1.25rem;
      display: flex; align-items: center; gap: 1rem;
      border-left: 4px solid #444;
      transition: border-color 0.3s;
    }
    .check.pass { border-left-color: #4ade80; }
    .check.warn { border-left-color: #facc15; }
    .check.fail { border-left-color: #f87171; }
    .check.running { border-left-color: #60a5fa; }
    .indicator {
      width: 12px; height: 12px; border-radius: 50%;
      background: #444; flex-shrink: 0;
    }
    .check.pass .indicator { background: #4ade80; }
    .check.warn .indicator { background: #facc15; }
    .check.fail .indicator { background: #f87171; }
    .check.running .indicator { background: #60a5fa; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    .check-info { flex: 1; }
    .check-name { font-weight: 600; font-size: 0.95rem; }
    .check-detail { font-size: 0.8rem; color: #888; margin-top: 2px; }
    .check-time { font-size: 0.8rem; font-variant-numeric: tabular-nums; min-width: 60px; text-align: right; }
    .check.pass .check-time { color: #4ade80; }
    .check.warn .check-time { color: #facc15; }
    .check.fail .check-time { color: #f87171; }
    .actions { margin-top: 2rem; }
    button {
      background: #1e3a5f; color: #e0e0e0; border: 1px solid #2a4a6f;
      padding: 0.5rem 1.25rem; border-radius: 6px; cursor: pointer;
      font-size: 0.9rem;
    }
    button:hover { background: #2a4a6f; }
    .timestamp { color: #555; font-size: 0.75rem; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <h1>MarkerMind Connection Health</h1>
  <p class="subtitle">Static diagnostic page &mdash; no JS framework dependencies</p>

  <div class="checks" id="checks"></div>

  <div class="actions">
    <button onclick="runAllChecks()">Re-run checks</button>
  </div>
  <p class="timestamp" id="timestamp"></p>

  <script>
    var checks = [
      {
        id: 'frontend',
        name: 'Frontend server',
        detail: 'GET /',
        run: function() { return httpCheck('/'); }
      },
      {
        id: 'static',
        name: 'Static asset serving',
        detail: 'GET /health.html (self)',
        run: function() { return httpCheck('/health.html'); }
      },
      {
        id: 'hmr',
        name: 'HMR WebSocket',
        detail: 'ws:// /_next/webpack-hmr',
        run: function() { return wsCheck(); }
      },
      {
        id: 'backend',
        name: 'Backend API',
        detail: 'GET /api/health or /api/auth/me',
        run: function() { return backendCheck(); }
      }
    ];

    function httpCheck(path) {
      return new Promise(function(resolve) {
        var start = performance.now();
        fetch(path, { cache: 'no-store' })
          .then(function(r) {
            var ms = Math.round(performance.now() - start);
            resolve({ ok: r.ok, ms: ms, detail: r.status + ' ' + r.statusText });
          })
          .catch(function(e) {
            var ms = Math.round(performance.now() - start);
            resolve({ ok: false, ms: ms, detail: e.message });
          });
      });
    }

    function backendCheck() {
      return new Promise(function(resolve) {
        var start = performance.now();
        // Try the backend on port 8000 relative to current host
        var host = window.location.hostname;
        var url = 'http://' + host + ':8000/api/auth/me';
        fetch(url, { cache: 'no-store', mode: 'no-cors' })
          .then(function() {
            var ms = Math.round(performance.now() - start);
            // no-cors gives opaque response, so any completion = server reachable
            resolve({ ok: true, ms: ms, detail: 'reachable (opaque)' });
          })
          .catch(function(e) {
            var ms = Math.round(performance.now() - start);
            resolve({ ok: false, ms: ms, detail: e.message });
          });
      });
    }

    function wsCheck() {
      return new Promise(function(resolve) {
        var start = performance.now();
        var proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        var url = proto + '//' + window.location.host + '/_next/webpack-hmr';
        var ws;
        var timer = setTimeout(function() {
          try { ws.close(); } catch(e) {}
          var ms = Math.round(performance.now() - start);
          resolve({ ok: false, ms: ms, detail: 'timeout (3s)' });
        }, 3000);

        try {
          ws = new WebSocket(url);
          ws.onopen = function() {
            clearTimeout(timer);
            var ms = Math.round(performance.now() - start);
            ws.close();
            resolve({ ok: true, ms: ms, detail: 'connected' });
          };
          ws.onerror = function() {
            clearTimeout(timer);
            var ms = Math.round(performance.now() - start);
            // WS not available is expected in production mode
            resolve({ ok: false, ms: ms, detail: 'failed (normal in prod mode)' });
          };
        } catch(e) {
          clearTimeout(timer);
          var ms = Math.round(performance.now() - start);
          resolve({ ok: false, ms: ms, detail: e.message });
        }
      });
    }

    function renderCheck(check, state) {
      // state: 'running' | result object
      var el = document.getElementById('check-' + check.id);
      if (!el) {
        el = document.createElement('div');
        el.id = 'check-' + check.id;
        el.className = 'check running';
        el.innerHTML =
          '<div class="indicator"></div>' +
          '<div class="check-info">' +
            '<div class="check-name">' + check.name + '</div>' +
            '<div class="check-detail">' + check.detail + '</div>' +
          '</div>' +
          '<div class="check-time">...</div>';
        document.getElementById('checks').appendChild(el);
      }

      if (state === 'running') {
        el.className = 'check running';
        el.querySelector('.check-time').textContent = '...';
        el.querySelector('.check-detail').textContent = check.detail;
        return;
      }

      // Result
      var cls = 'fail';
      if (state.ok) {
        cls = state.ms < 500 ? 'pass' : 'warn';
      }
      el.className = 'check ' + cls;
      el.querySelector('.check-time').textContent = state.ms + 'ms';
      el.querySelector('.check-detail').textContent = state.detail;
    }

    function runAllChecks() {
      document.getElementById('timestamp').textContent =
        'Last run: ' + new Date().toLocaleTimeString();

      checks.forEach(function(check) {
        renderCheck(check, 'running');
        check.run().then(function(result) {
          renderCheck(check, result);
        });
      });
    }

    // Auto-run on load
    runAllChecks();
  </script>
</body>
</html>
